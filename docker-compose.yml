services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ns_30-backend
    restart: unless-stopped
    # Mapping host 5002 to container 5000
    ports:
      - "127.0.0.1:5002:5000"
    networks:
      - infra_internal
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      NODE_ENV: production
    # Resource limits
    cpus: "0.75"
    mem_limit: 1g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://api.nammasambandhi.com/api}
        - VITE_SOCKET_URL=${VITE_SOCKET_URL:-https://api.nammasambandhi.com}
    container_name: ns_30-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5178:80"
    networks:
      - infra_internal
    depends_on:
      - backend
    cpus: "0.10"
    mem_limit: 128m

networks:
  infra_internal:
    external: true
