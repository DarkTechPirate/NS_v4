
name: "deploy:venues"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: deploy-to-vps
    runs-on: ubuntu-latest

    steps:
      - name: Deploy venues app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ops
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/apps/NS_v4
            
            # NOTE: Ensure the 'ops' user owns /opt/apps/NS_3.0 on the VPS:
            # sudo chown -R ops:ops /opt/apps/NS_3.0
            # Also ensure 'ops' is in the 'docker' group:
            # sudo usermod -aG docker ops
            
            # Resolve potential git ownership issues
            git config --global --add safe.directory /opt/apps/NS_v4
            
            # Fetch and reset without sudo (assuming ownership is fixed)
            git fetch origin main
            git reset --hard origin/main
            
            # Docker operations (assuming user is in docker group)
            docker compose down --remove-orphans
            docker system prune -f
            docker compose up -d --build
